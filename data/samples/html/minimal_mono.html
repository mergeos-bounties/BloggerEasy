  <style>

    p { color: #333; }
    footer { border-top: 1px solid #000; padding-top: 1rem; margin-top: 3rem; font-size: 0.85rem; color: #666; }

<body>
  <header><h1>Mono Notes</h1></header>
  <nav><a href="/">Home</a><a href="/archive">Archive</a><a href="/about">About</a></nav>

  </main>
