<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Mono Blog</title>
  <style>
    body {
      background: #fff;
      color: #000;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 20px;
    }
    .blog-header {
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .blog-header h1 {
      font-size: 2em;
      font-weight: normal;
      margin: 0;
    }
    .blog-post {
      margin-bottom: 30px;
    }
    .blog-post h2 {
      font-size: 1.5em;
      font-weight: normal;
      margin: 0 0 5px 0;
    }
    .blog-post .date {
      color: #999;
      font-size: 0.9em;
      margin-bottom: 10px;
    }
    .blog-post p {
      margin: 0 0 10px 0;
    }
  </style>
</head>
<body>
  <div class="blog-header"><h1>My Minimal Blog</h1></div>
  <div class="blog-post">
    <h2>A Simple Post</h2>
    <div class="date">February 15, 2025</div>
    <p>This is a minimal monochrome blog post. Content goes here.</p>
  </div>
