<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pricing Cards</title>
  <meta name="description" content="Pricing cards HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0f172a; color:#e2e8f0; }
    header { text-align:center; padding:2rem 1rem .5rem; }
    main { max-width:960px; margin:0 auto; padding:1rem 1.25rem 2.5rem;
      display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1rem; }
    .card { background:#1e293b; border:1px solid #334155; border-radius:14px;
      padding:1.4rem 1.2rem; text-align:center; }
    .card h2 { margin:.2rem 0; font-size:1.1rem; color:#7dd3fc; }
    .card .price { font-size:1.85rem; font-weight:700; color:#f8fafc; margin:.6rem 0; }
    .card ul { list-style:none; padding:0; margin:1rem 0; color:#94a3b8; font-size:.9rem; }
    .card li { margin:.35rem 0; }
    .card button { background:#0ea5e9; color:#0f172a; border:0; border-radius:8px;
      padding:.55rem 1.1rem; font-weight:600; cursor:pointer; }
    footer { text-align:center; color:#64748b; font-size:.8rem; padding:1.5rem; }
  </style>
</head>
<body>
  <header><h1>Plans</h1><p>Sample pricing cards for theme export</p></header>
  <main>
    <div class="card">
      <h2>Starter</h2>
      <div class="price">$0</div>
      <ul><li>Offline demos</li><li>HTML fixtures</li><li>CLI validate</li></ul>
      <button type="button">Get started</button>
    </div>
    <div class="card">
      <h2>Pro</h2>
      <div class="price">$19</div>
      <ul><li>Theme packs</li><li>Export tools</li><li>Priority docs</li></ul>
      <button type="button">Choose Pro</button>
    </div>
    <div class="card">
      <h2>Studio</h2>
      <div class="price">$49</div>
      <ul><li>Custom CSS</li><li>Batch export</li><li>Support queue</li></ul>
      <button type="button">Contact</button>
    </div>
  </main>
  <footer>Demo HTML · BloggerEasy pricing_cards_page</footer>
</body>
</html>
