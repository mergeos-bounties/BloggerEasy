<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Changelog Timeline</title>
  <meta name="description" content="Changelog timeline HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0f172a; color:#e2e8f0; }
    header { padding:2rem 1.25rem; border-bottom:1px solid #1e293b; }
    main { max-width:720px; margin:0 auto; padding:1.5rem 1.25rem 3rem; }
    .item { display:grid; grid-template-columns:100px 1fr; gap:1rem; padding:1rem 0;
      border-bottom:1px solid #1e293b; }
    .date { color:#38bdf8; font-size:.9rem; font-variant-numeric:tabular-nums; }
    .item h2 { margin:0 0 .35rem; font-size:1.05rem; }
    .item p { margin:0; color:#94a3b8; font-size:.95rem; }
    footer { text-align:center; color:#64748b; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>Product Changelog</h1><p>Sample timeline for theme export</p></header>
  <main>
    <div class="item"><div class="date">2026-07</div><div>
      <h2>Docs hub fixture</h2><p>Offline HTML samples for export smoke tests.</p></div></div>
    <div class="item"><div class="date">2026-06</div><div>
      <h2>Palette extract</h2><p>Region hints from demo images.</p></div></div>
    <div class="item"><div class="date">2026-05</div><div>
      <h2>Theme packs</h2><p>Bounty-ready HTML theme skeletons.</p></div></div>
  </main>
  <footer>Demo HTML · BloggerEasy changelog_timeline_page</footer>
</body>
</html>
