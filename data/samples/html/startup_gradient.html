<!DOCTYPE html>
<html>
<head>
  <title>Launchpad</title>
  <meta name="description" content="Bold gradient hero for early-stage startup" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; margin: 0; min-height: 100vh; }
    .hero { padding: 6rem 2rem; text-align: center; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 3rem; font-weight: 800; margin: 0 0 1rem; line-height: 1.1; }
    .tagline { font-size: 1.25rem; opacity: 0.9; margin-bottom: 2rem; }
    .cta { display: inline-block; padding: 1rem 2rem; background: #fff; color: #764ba2; border-radius: 6px; font-weight: 600; text-decoration: none; }
    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; padding: 4rem 2rem; background: rgba(255,255,255,0.1); }
    .feature h3 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    .feature p { opacity: 0.85; line-height: 1.5; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Ship faster, sleep better</h1>
    <p class="tagline">The dev platform that scales with your team — from prototype to production.</p>
    <a href="/start" class="cta">Start free trial →</a>
  </section>
  <section class="features">
    <div class="feature"><h3>Zero config</h3><p>Deploy in seconds. No YAML, no DevOps.</p></div>
    <div class="feature"><h3>Live preview</h3><p>Every commit gets a URL.</p></div>
    <div class="feature"><h3>Pay-as-you-go</h3><p>No upfront costs. Cancel anytime.</p></div>
  </section>
</body>
</html>
