<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Careers</title>
  <meta name="description" content="Careers HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#faf5ff; color:#3b0764; }
    header { padding:2rem 1.25rem; background:#6b21a8; color:#faf5ff; }
    main { max-width:720px; margin:0 auto; padding:1.5rem 1.25rem 3rem; }
    .job { background:#fff; border:1px solid #e9d5ff; border-radius:12px; padding:1rem 1.1rem; margin:.75rem 0; }
    .job h2 { margin:0 0 .35rem; font-size:1.05rem; }
    .tag { display:inline-block; background:#f3e8ff; color:#7e22ce; font-size:.75rem;
      font-weight:600; padding:.2rem .5rem; border-radius:999px; margin-right:.35rem; }
    footer { text-align:center; color:#a855f7; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>Open roles</h1><p>Sample careers listing for theme export</p></header>
  <main>
    <div class="job"><h2>Product engineer</h2>
      <span class="tag">Remote</span><span class="tag">Full-time</span>
      <p>Ship offline demos and bounty tooling.</p></div>
    <div class="job"><h2>Theme designer</h2>
      <span class="tag">Contract</span>
      <p>HTML fixtures and brand systems.</p></div>
  </main>
  <footer>Demo HTML · BloggerEasy careers_page</footer>
</body>
</html>
