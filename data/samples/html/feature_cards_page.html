<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Features</title>
  <meta name="description" content="Feature cards HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0b1220; color:#e2e8f0; }
    header { text-align:center; padding:2rem 1rem .75rem; }
    main { max-width:960px; margin:0 auto; padding:1rem 1.25rem 2.5rem;
      display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1rem; }
    .card { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:1.25rem; }
    .card h3 { margin:0 0 .4rem; font-size:1.05rem; color:#38bdf8; }
    .card p { margin:0; color:#94a3b8; font-size:.9rem; line-height:1.45; }
    footer { text-align:center; color:#64748b; font-size:.8rem; padding:1.5rem; }
  </style>
</head>
<body>
  <header><h1>Features</h1><p>Sample feature grid for theme export</p></header>
  <main>
    <div class="card"><h3>Offline fixtures</h3><p>Validate themes without a live Blogger account.</p></div>
    <div class="card"><h3>CLI gen</h3><p>Generate packs and sample HTML from the terminal.</p></div>
    <div class="card"><h3>Export ready</h3><p>XML/HTML samples ready for Blogger Theme import.</p></div>
  </main>
  <footer>Demo HTML · BloggerEasy feature_cards_page</footer>
</body>
</html>
