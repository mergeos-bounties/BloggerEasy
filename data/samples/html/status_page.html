<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Status Page</title>
  <meta name="description" content="Status page HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0b1220; color:#e2e8f0; }
    header { text-align:center; padding:2rem 1rem 1rem; }
    header h1 { margin:0 0 .4rem; font-size:1.5rem; }
    header p { margin:0; color:#94a3b8; font-size:.95rem; }
    main { max-width:640px; margin:0 auto; padding:1rem 1.25rem 2.5rem; }
    .row { display:flex; justify-content:space-between; align-items:center;
      padding:.85rem 1rem; border:1px solid #1f2937; border-radius:10px;
      background:#111827; margin-bottom:.6rem; }
    .ok { color:#4ade80; font-weight:700; font-size:.85rem; }
    .degraded { color:#fbbf24; font-weight:700; font-size:.85rem; }
    footer { text-align:center; color:#64748b; font-size:.8rem; padding:1.5rem; }
  </style>
</head>
<body>
  <header><h1>System status</h1><p>Sample status board for theme export</p></header>
  <main>
    <div class="row"><span>API / gen</span><span class="ok">Operational</span></div>
    <div class="row"><span>Validate</span><span class="ok">Operational</span></div>
    <div class="row"><span>Ledger / Scan</span><span class="ok">Operational</span></div>
    <div class="row"><span>Bounty queue</span><span class="degraded">Elevated load</span></div>
  </main>
  <footer>Demo HTML · BloggerEasy status_page</footer>
</body>
</html>
