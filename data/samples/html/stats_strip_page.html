<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stats</title>
  <meta name="description" content="Stats strip HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0f172a; color:#e2e8f0; }
    header { text-align:center; padding:2rem 1rem .5rem; }
    main { max-width:900px; margin:0 auto; padding:1rem 1.25rem 2.5rem;
      display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; }
    .stat { background:#1e293b; border-radius:12px; padding:1.25rem; text-align:center;
      border:1px solid #334155; }
    .stat strong { display:block; font-size:1.75rem; color:#38bdf8; }
    .stat span { color:#94a3b8; font-size:.85rem; }
    footer { text-align:center; color:#64748b; font-size:.8rem; padding:1.5rem; }
  </style>
</head>
<body>
  <header><h1>By the numbers</h1><p>Sample stats strip for theme export</p></header>
  <main>
    <div class="stat"><strong>12k+</strong><span>Themes validated</span></div>
    <div class="stat"><strong>48</strong><span>Sample packs</span></div>
    <div class="stat"><strong>99%</strong><span>Offline smoke pass</span></div>
    <div class="stat"><strong>0</strong><span>Secrets in fixtures</span></div>
  </main>
  <footer>Demo HTML · BloggerEasy stats_strip_page</footer>
</body>
</html>
