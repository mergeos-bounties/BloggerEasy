<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Local Jobs Board</title>
  <meta name="description" content="Job board list fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#f1f5f9; color:#0f172a; }
    header { background:#1e3a5f; color:#f8fafc; padding:1.75rem 1.25rem; }
    header h1 { margin:0; font-size:1.5rem; }
    main { max-width:760px; margin:0 auto; padding:1.25rem; }
    .job { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:1rem 1.1rem; margin:.75rem 0; }
    .job h2 { margin:0 0 .35rem; font-size:1.05rem; }
    .meta { color:#64748b; font-size:.85rem; }
    .tag { display:inline-block; background:#dbeafe; color:#1d4ed8; font-size:.7rem;
      font-weight:700; padding:.15rem .45rem; border-radius:999px; margin-right:.35rem; }
    footer { text-align:center; color:#94a3b8; padding:2rem; font-size:.85rem; }
  </style>
</head>
<body>
  <header><h1>Open roles</h1><p>Sample listing for theme conversion</p></header>
  <main>
    <article class="job"><span class="tag">Remote</span><h2>Python backend engineer</h2>
      <p class="meta">MergeOS · Full-time · 25–50 MRG bounty adjacent</p>
      <p>Ship FastAPI services, tests, and docs.</p></article>
    <article class="job"><span class="tag">Hybrid</span><h2>Frontend (Vue)</h2>
      <p class="meta">Product · Contract</p>
      <p>Dashboard UX and accessibility polish.</p></article>
  </main>
  <footer>Demo HTML · BloggerEasy job_board</footer>
</body>
</html>
