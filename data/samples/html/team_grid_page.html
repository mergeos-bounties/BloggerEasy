<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Team</title>
  <meta name="description" content="Team grid HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0f172a; color:#e2e8f0; }
    header { text-align:center; padding:2rem 1rem .5rem; }
    main { max-width:900px; margin:0 auto; padding:1rem 1.25rem 2.5rem;
      display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; }
    .card { background:#1e293b; border-radius:12px; padding:1.25rem; text-align:center;
      border:1px solid #334155; }
    .card h3 { margin:.5rem 0 .25rem; font-size:1rem; }
    .card p { margin:0; color:#94a3b8; font-size:.85rem; }
    .avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#38bdf8,#818cf8);
      margin:0 auto; }
    footer { text-align:center; color:#64748b; font-size:.8rem; padding:1.5rem; }
  </style>
</head>
<body>
  <header><h1>Our Team</h1><p>Sample team grid for theme export</p></header>
  <main>
    <div class="card"><div class="avatar"></div><h3>Alex Kim</h3><p>Product</p></div>
    <div class="card"><div class="avatar"></div><h3>Sam Rivera</h3><p>Engineering</p></div>
    <div class="card"><div class="avatar"></div><h3>Jordan Lee</h3><p>Design</p></div>
    <div class="card"><div class="avatar"></div><h3>Casey Wu</h3><p>Support</p></div>
  </main>
  <footer>Demo HTML · BloggerEasy team_grid_page</footer>
</body>
</html>
